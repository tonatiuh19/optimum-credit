      tags: [Smoke Tests]
      summary: Issue a real session token for smoke testing (requires SMOKE_TEST_SECRET)
      description: |
        Only available when the `SMOKE_TEST_SECRET` environment variable is set.
        Returns a fully valid session token for the given actor and email so that
        smoke tests can authenticate without going through the OTP email flow.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [secret, actor, email]
              properties:
                secret:
                  type: string
                  description: Must match SMOKE_TEST_SECRET env var
                actor:
                  type: string
                  enum: [admin, client]
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  id:
                    type: integer
                  email:
                    type: string
        "401":
          description: Wrong secret
        "404":
          description: Actor not found

