openapi: 3.0.3
info:
  title: Optimum Credit API
  description: |
    REST API for the Optimum Credit platform.

    ## Authentication
    - **Protected routes** require `Authorization: Bearer <session_token>`
    - **Public routes** require no authentication

    ## Base URL
    All endpoints are prefixed with `/api`.
  version: "1.0.0"
  contact:
    name: Optimum Credit Dev

servers:
  - url: /api
    description: Same-origin (development & production)

tags:
  - name: Health
    description: System health checks
  - name: Auth
    description: Authentication (client & admin)
  - name: Legal
    description: Public legal documents (DB-backed markdown)
  - name: Registration
    description: Public registration & Authorize.net payment flow
  - name: Portal
    description: Client portal — documents, dashboard
  - name: Admin
    description: Admin-only operations
  - name: CRC
    description: Credit Repair Cloud integration — sync & webhooks

paths:
  /legal:
    get:
      tags: [Legal]
      summary: List legal document summaries
      responses:
        "200":
          description: Document list
          content:
            application/json:
              schema:
                type: object
                properties:
                  documents:
                    type: array
                    items:
                      type: object
                      properties:
                        slug: { type: string }
                        title: { type: string }
                        updated_at: { type: string, format: date-time }
        "503":
          description: Database unavailable

  /legal/{slug}:
    get:
      tags: [Legal]
      summary: Get a legal document by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            enum: [terms, privacy]
      responses:
        "200":
          description: Full markdown document
          content:
            application/json:
              schema:
                type: object
                properties:
                  document:
                    type: object
                    properties:
                      slug: { type: string }
                      title: { type: string }
                      content_md: { type: string }
                      source_url: { type: string, nullable: true }
                      updated_at: { type: string, format: date-time }
        "404":
          description: Not found
        "503":
          description: Database unavailable

  /admin/legal:
    get:
      tags: [Admin, Legal]
      summary: List legal documents (super admin)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Full documents for editing
        "401":
          description: Unauthorized

  /admin/legal/{slug}:
    put:
      tags: [Admin, Legal]
      summary: Update a legal document (super admin)
      security:
        - bearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, content_md]
              properties:
                title: { type: string }
                content_md: { type: string }
                source_url: { type: string, nullable: true }
      responses:
        "200":
          description: Updated document
        "400":
          description: Validation error
        "404":
          description: Not found

  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time

  /ping:
    get:
      tags: [Health]
      summary: Ping
      responses:
        "200":
          description: Pong
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: pong

  /registration:
    post:
      tags: [Registration]
      summary: Register a new client
      description: |
        Creates or updates a pending client record and returns the data needed
        to render the payment step. When Authorize.net is not configured a mock
        `transactionId` is returned (`isMock: true`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                [
                  firstName,
                  lastName,
                  email,
                  addressLine1,
                  city,
                  state,
                  zip,
                  ssnLast4,
                  packageSlug,
                ]
              properties:
                firstName: { type: string }
                lastName: { type: string }
                email: { type: string, format: email }
                phone: { type: string }
                addressLine1: { type: string }
                addressLine2: { type: string }
                city: { type: string }
                state: { type: string, minLength: 2, maxLength: 2 }
                zip: { type: string, pattern: '^\d{5}$' }
                ssnLast4: { type: string, pattern: '^\d{4}$' }
                packageSlug: { type: string }
                affiliateCode: { type: string }
                coupon_code:
                  type: string
                  description: Optional promotional coupon code to apply a discount to the charge
      responses:
        "200":
          description: Client registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  clientId: { type: integer }
                  packageId: { type: integer }
                  packageName: { type: string }
                  amountCents: { type: integer }
                  isMock: { type: boolean }
                  mockTransactionId:
                    type: string
                    description: Only present when isMock is true
        "400":
          description: Validation error
        "409":
          description: Email already has an active account

  /tradeline-products:
    get:
      tags: [Registration]
      summary: List active tradeline products (public catalog)
      responses:
        "200":
          description: Tradeline catalog
          content:
            application/json:
              schema:
                type: object
                properties:
                  products:
                    type: array
                    items:
                      $ref: "#/components/schemas/TradelineProduct"

  /registration/process-payment:
    post:
      tags: [Registration]
      summary: Charge card via Authorize.net Accept.js nonce (legacy two-step flow)
      description: |
        Accepts an opaque payment nonce from Accept.js when Authorize.net is configured,
        or processes a mock payment when it is not. For `tradeline_picker` packages,
        pass `tradelineProductIds` and the charge amount is the sum of selected lines.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [clientId]
              properties:
                clientId: { type: integer }
                dataDescriptor:
                  type: string
                  example: COMMON.ACCEPT.INAPP.PAYMENT
                dataValue:
                  type: string
                  description: Opaque nonce from Accept.js
                tradelineProductIds:
                  type: array
                  items: { type: integer }
                  description: Required when package checkout_type is tradeline_picker
      responses:
        "200":
          description: Payment succeeded
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        "402":
          description: Payment declined
        "404":
          description: Client not found
        "503":
          description: Payment provider not configured (only when nonce required and ANet missing)

  /portal/peace-of-mind:
    get:
      tags: [Portal]
      summary: Peace of Mind subscription eligibility and status
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Plan details, eligibility, optional active subscription

  /portal/peace-of-mind/subscribe:
    post:
      tags: [Portal]
      summary: Start Peace of Mind monthly subscription (ARB)
      security: [{ BearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                use_stored_card: { type: boolean }
                dataDescriptor: { type: string }
                dataValue: { type: string }
      responses:
        "200":
          description: Subscription created

  /portal/peace-of-mind/cancel:
    post:
      tags: [Portal]
      summary: Cancel Peace of Mind subscription
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Subscription cancelled

  /admin/subscriptions:
    get:
      tags: [Admin]
      summary: List client subscriptions (Peace of Mind ARB, etc.)
      security: [{ BearerAuth: [] }]
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [all, active, cancelled, suspended, expired]
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer }
        - in: query
          name: limit
          schema: { type: integer }
      responses:
        "200":
          description: Paginated subscriptions with MRR summary

  /admin/tradeline-products:
    get:
      tags: [Admin]
      summary: List all tradeline products (admin)
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Full catalog including inactive
    post:
      tags: [Admin]
      summary: Create tradeline product
      security: [{ BearerAuth: [] }]
      responses:
        "201":
          description: Created

  /admin/tradeline-products/{id}:
    put:
      tags: [Admin]
      summary: Update tradeline product
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Updated
    delete:
      tags: [Admin]
      summary: Delete tradeline product
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted

  /webhooks/authorize-net:
    post:
      tags: [Registration]
      summary: Authorize.net webhook (ARB subscription events)
      description: |
        Optional signature verification via `ANET_WEBHOOK_SIGNATURE_KEY`.
        Raw body must be preserved for HMAC validation.
      responses:
        "200":
          description: Processed

  /registration/confirm-mock:
    post:
      tags: [Registration]
      summary: Confirm a sandbox mock payment (dev only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [clientId, transactionId]
              properties:
                clientId: { type: integer }
                transactionId:
                  type: string
                  description: The mockTransactionId returned by /registration
      responses:
        "200":
          description: Mock payment confirmed
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        "400":
          description: Invalid or non-mock transaction ID

  /auth/onboarding/{token}:
    summary: Redeem magic-link onboarding token
    description: |
      Validates a single-use onboarding token embedded in the welcome email.
      On success, creates a client session and returns a bearer token.
      Tokens expire after 72 hours and are single-use (`consumed_at` is set).
    parameters:
      - in: path
        name: token
        required: true
        schema:
          type: string
        description: Raw 64-character hex onboarding token from the welcome email link
    responses:
      "200":
        description: Token valid — session created
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
                  description: Bearer session token for subsequent requests
                user:
                  type: object
                  properties:
                    id:
                      type: integer
                    email:
                      type: string
                    first_name:
                      type: string
                    last_name:
                      type: string
      "400":
        description: Token expired or already used
        content:
          application/json:
            schema:
              type: object
              properties:
                error:
                  type: string
                  example: Link expired or already used

  /portal/payments:
    get:
      tags: [Portal]
      summary: Get authenticated client's payment history
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of payments for the client
          content:
            application/json:
              schema:
                type: object
                properties:
                  payments:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        package_name:
                          type: string
                          nullable: true
                        amount_cents:
                          type: integer
                        discount_cents:
                          type: integer
                        original_amount_cents:
                          type: integer
                          nullable: true
                        currency:
                          type: string
                        status:
                          type: string
                          enum:
                            [pending, succeeded, failed, refunded, cancelled]
                        provider:
                          type: string
                        coupon_code:
                          type: string
                          nullable: true
                        paid_at:
                          type: string
                          format: date-time
                          nullable: true
                        created_at:
                          type: string
                          format: date-time
        "401":
          description: Unauthorized

  /admin/payments:
    get:
      tags: [Admin]
      summary: Get paginated payments with filters and summary metrics
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [all, pending, succeeded, failed, refunded, cancelled]
        - in: query
          name: provider
          schema:
            type: string
            enum: [all, authorize_net, stripe, manual]
        - in: query
          name: search
          schema:
            type: string
          description: Name, email, or transaction ID search
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 10
            maximum: 100
      responses:
        "200":
          description: Paginated payment results plus summary metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  payments:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        client_id:
                          type: integer
                        package_id:
                          type: integer
                          nullable: true
                        package_name:
                          type: string
                          nullable: true
                        package_slug:
                          type: string
                          nullable: true
                        amount_cents:
                          type: integer
                        discount_cents:
                          type: integer
                        original_amount_cents:
                          type: integer
                          nullable: true
                        currency:
                          type: string
                        status:
                          type: string
                          enum:
                            [pending, succeeded, failed, refunded, cancelled]
                        provider:
                          type: string
                        coupon_code:
                          type: string
                          nullable: true
                        provider_transaction_id:
                          type: string
                          nullable: true
                        provider_charge_id:
                          type: string
                          nullable: true
                        failure_reason:
                          type: string
                          nullable: true
                        paid_at:
                          type: string
                          format: date-time
                          nullable: true
                        created_at:
                          type: string
                          format: date-time
                        updated_at:
                          type: string
                          format: date-time
                        client_first_name:
                          type: string
                          nullable: true
                        client_last_name:
                          type: string
                          nullable: true
                        client_email:
                          type: string
                          nullable: true
                        client_phone:
                          type: string
                          nullable: true
                        client_pipeline_stage:
                          type: string
                          nullable: true
                        client_status:
                          type: string
                          nullable: true
                  summary:
                    type: object
                    properties:
                      total_count:
                        type: integer
                      succeeded_count:
                        type: integer
                      pending_count:
                        type: integer
                      failed_count:
                        type: integer
                      refunded_count:
                        type: integer
                      total_revenue_cents:
                        type: integer
                      revenue_30d_cents:
                        type: integer
                      revenue_7d_cents:
                        type: integer
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      total:
                        type: integer
                      totalPages:
                        type: integer
        "401":
          description: Unauthorized

  /portal/documents:
    post:
      tags: [Portal]
      summary: Upload a document (client)
      security:
        - BearerAuth: []
      description: |
        Accepts a multipart form upload. The file is encrypted with AES-256-GCM
        before being stored on disk. `enc_iv` and `enc_tag` are persisted in the
        database to enable decryption during admin review.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [doc_type, file]
              properties:
                doc_type:
                  type: string
                  enum: [id_front, id_back, ssn_card, proof_of_address, other]
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Upload successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientDocument"
        "400":
          description: Missing or invalid fields
        "401":
          description: Unauthorized

  /portal/documents/{id}/file:
    get:
      tags: [Portal]
      summary: View own submitted document file (client)
      security:
        - BearerAuth: []
      description: |
        Decrypts and streams the client's own uploaded document. Only the
        document owner can access this endpoint — `client_id` is validated
        server-side against the authenticated session.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Document ID
      responses:
        "200":
          description: Raw decrypted file bytes with correct Content-Type
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          description: Unauthorized
        "404":
          description: Document not found or does not belong to this client

  /admin/documents/{id}/file:
    get:
      tags: [Admin]
      summary: Download decrypted document file (admin)
      security:
        - BearerAuth: []
      description: |
        Reads the encrypted file from disk, decrypts it with AES-256-GCM using
        the stored `enc_iv` and `enc_tag`, and streams the raw file bytes back
        with the original `Content-Type`.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Document ID
      responses:
        "200":
          description: Decrypted file bytes
          content:
            image/*:
              schema:
                type: string
                format: binary
            application/pdf:
              schema:
                type: string
                format: binary
        "401":
          description: Unauthorized (admin only)
        "404":
          description: Document not found
        "500":
          description: Decryption failed

  /admin/documents/{id}/review:
    post:
      tags: [Admin]
      summary: Approve or reject a document (super admin)
      security:
        - BearerAuth: []
      description: |
        Approves or rejects a client document. On rejection, sends an email and
        SMS to the client with the rejection reason. When all 4 required documents
        are approved for the first time, the client is auto-advanced to `docs_ready`
        and a "documents verified" email + SMS is sent.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Document ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision]
              properties:
                decision:
                  type: string
                  enum: [approved, rejected]
                reason:
                  type: string
                  description: Required when decision is "rejected"
      responses:
        "200":
          description: Review recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  auto_advanced:
                    type: boolean
                    description: True if client was auto-advanced to docs_ready
        "400":
          description: Missing or invalid decision / reason
        "401":
          description: Unauthorized
        "404":
          description: Document not found

  /admin/pipeline:
    get:
      tags: [Admin]
      summary: Get all active credit repair cases for the pipeline Kanban board
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Pipeline cases
          content:
            application/json:
              schema:
                type: object
                properties:
                  cases:
                    type: array
                    items:
                      $ref: "#/components/schemas/CreditRepairCase"
        "401":
          description: Unauthorized

  /admin/task-templates:
    get:
      tags: [Admin]
      summary: List onboarding task templates with optional search and filters
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: search
          schema:
            type: string
          description: Full-text search across title_en, title_es, slug, description_en
        - in: query
          name: type
          schema:
            type: string
            enum: [all, form, upload, sign_document]
          description: Filter by task type
        - in: query
          name: active
          schema:
            type: string
            enum: [all, active, inactive]
          description: Filter by active status
      responses:
        "200":
          description: Filtered list of task templates
          content:
            application/json:
              schema:
                type: object
                properties:
                  tasks:
                    type: array
                    items:
                      $ref: "#/components/schemas/OnboardingTaskTemplate"
        "401":
          description: Unauthorized
    post:
      tags: [Admin]
      summary: Create a new onboarding task template
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskTemplatePayload"
      responses:
        "201":
          description: Task template created
        "400":
          description: Validation error
        "401":
          description: Unauthorized

  /admin/task-templates/{id}:
    put:
      tags: [Admin]
      summary: Update an existing task template
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskTemplatePayload"
      responses:
        "200":
          description: Updated task template
        "404":
          description: Not found
        "401":
          description: Unauthorized
    delete:
      tags: [Admin]
      summary: Delete a task template (blocked if system task or has completions)
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
        "400":
          description: Cannot delete (system task or has completions)
        "401":
          description: Unauthorized

  /admin/cases/{id}:
    get:
      tags: [Admin]
      summary: Get full detail for a single credit repair case
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Credit repair case ID
      responses:
        "200":
          description: Case detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  case_info:
                    type: object
                    properties:
                      id:
                        type: integer
                      case_number:
                        type: string
                        example: CR-00001
                      status:
                        type: string
                        enum: [active, completed, cancelled, on_hold]
                      pipeline_stage:
                        type: string
                      created_at:
                        type: string
                        format: date-time
                  client:
                    $ref: "#/components/schemas/AdminClientDetail"
                  documents:
                    type: array
                    items:
                      $ref: "#/components/schemas/ClientDocument"
                  reports:
                    type: array
                    items:
                      type: object
                  payments:
                    type: array
                    items:
                      type: object
                  pipeline_history:
                    type: array
                    items:
                      type: object
        "400":
          description: Invalid case ID
        "401":
          description: Unauthorized
        "404":
          description: Case not found

  /admin/cases/{id}/stage:
    post:
      tags: [Admin]
      summary: Move a credit repair case to a new pipeline stage
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Credit repair case ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [stage]
              properties:
                stage:
                  type: string
                  enum:
                    [
                      new_client,
                      docs_ready,
                      round_1,
                      round_2,
                      round_3,
                      round_4,
                      round_5,
                      completed,
                      cancelled,
                    ]
                notes:
                  type: string
      responses:
        "200":
          description: Stage updated (or unchanged if same stage)
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  unchanged:
                    type: boolean
                    description: True when the requested stage equals the current stage
        "400":
          description: Invalid stage value or case ID
        "401":
          description: Unauthorized
        "404":
          description: Case not found
        "422":
          description: Stage transition blocked (e.g. docs_ready requires all docs approved)

  /admin/clients:
    get:
      tags: [Admin]
      summary: List clients
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: stage
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                type: object
                properties:
                  clients:
