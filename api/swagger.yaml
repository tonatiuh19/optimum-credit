openapi: 3.0.3
info:
  title: Optimum Credit API
  description: |
    REST API for the Optimum Credit platform.

    ## Authentication
    - **Protected routes** require `Authorization: Bearer <session_token>`
    - **Public routes** require no authentication

    ## Base URL
    All endpoints are prefixed with `/api`.
  version: "1.0.0"
  contact:
    name: Optimum Credit Dev

servers:
  - url: /api
    description: Same-origin (development & production)

tags:
  - name: Health
    description: System health checks
  - name: Auth
    description: Authentication (client & admin)
  - name: Registration
    description: Public registration & Authorize.net payment flow
  - name: Portal
    description: Client portal — documents, dashboard
  - name: Admin
    description: Admin-only operations
  - name: CRC
    description: Credit Repair Cloud integration — sync & webhooks

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time

  /ping:
    get:
      tags: [Health]
      summary: Ping
      responses:
        "200":
          description: Pong
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: pong

  /registration:
    post:
      tags: [Registration]
      summary: Register a new client
      description: |
        Creates or updates a pending client record and returns the data needed
        to render the payment step. When Authorize.net is not configured a mock
        `transactionId` is returned (`isMock: true`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                [
                  firstName,
                  lastName,
                  email,
                  addressLine1,
                  city,
                  state,
                  zip,
                  ssnLast4,
                  packageSlug,
                ]
              properties:
                firstName: { type: string }
                lastName: { type: string }
                email: { type: string, format: email }
                phone: { type: string }
                addressLine1: { type: string }
                addressLine2: { type: string }
                city: { type: string }
                state: { type: string, minLength: 2, maxLength: 2 }
                zip: { type: string, pattern: '^\d{5}$' }
                ssnLast4: { type: string, pattern: '^\d{4}$' }
                packageSlug: { type: string }
                affiliateCode: { type: string }
      responses:
        "200":
          description: Client registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  clientId: { type: integer }
                  packageId: { type: integer }
                  packageName: { type: string }
                  amountCents: { type: integer }
                  isMock: { type: boolean }
                  mockTransactionId:
                    type: string
                    description: Only present when isMock is true
        "400":
          description: Validation error
        "409":
          description: Email already has an active account

  /registration/process-payment:
    post:
      tags: [Registration]
      summary: Charge card via Authorize.net Accept.js nonce
      description: |
        Accepts an opaque payment nonce from the client-side Accept.js library,
        charges the card through Authorize.net, and marks the client as onboarded.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [clientId, dataDescriptor, dataValue]
              properties:
                clientId: { type: integer }
                dataDescriptor:
                  type: string
                  example: COMMON.ACCEPT.INAPP.PAYMENT
                dataValue:
                  type: string
                  description: Opaque nonce from Accept.js
      responses:
        "200":
          description: Payment succeeded
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        "402":
          description: Payment declined
        "404":
          description: Client not found
        "503":
          description: Payment provider not configured

  /registration/confirm-mock:
    post:
      tags: [Registration]
      summary: Confirm a sandbox mock payment (dev only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [clientId, transactionId]
              properties:
                clientId: { type: integer }
                transactionId:
                  type: string
                  description: The mockTransactionId returned by /registration
      responses:
        "200":
          description: Mock payment confirmed
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        "400":
          description: Invalid or non-mock transaction ID

  /auth/onboarding/{token}:
    summary: Redeem magic-link onboarding token
    description: |
      Validates a single-use onboarding token embedded in the welcome email.
      On success, creates a client session and returns a bearer token.
      Tokens expire after 72 hours and are single-use (`consumed_at` is set).
    parameters:
      - in: path
        name: token
        required: true
        schema:
          type: string
        description: Raw 64-character hex onboarding token from the welcome email link
    responses:
      "200":
        description: Token valid — session created
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
                  description: Bearer session token for subsequent requests
                user:
                  type: object
                  properties:
                    id:
                      type: integer
                    email:
                      type: string
                    first_name:
                      type: string
                    last_name:
                      type: string
      "400":
        description: Token expired or already used
        content:
          application/json:
            schema:
              type: object
              properties:
                error:
                  type: string
                  example: Link expired or already used

  /portal/documents:
    post:
      tags: [Portal]
      summary: Upload a document (client)
      security:
        - BearerAuth: []
      description: |
        Accepts a multipart form upload. The file is encrypted with AES-256-GCM
        before being stored on disk. `enc_iv` and `enc_tag` are persisted in the
        database to enable decryption during admin review.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [doc_type, file]
              properties:
                doc_type:
                  type: string
                  enum: [id_front, id_back, ssn_card, proof_of_address, other]
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Upload successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientDocument"
        "400":
          description: Missing or invalid fields
        "401":
          description: Unauthorized

  /portal/documents/{id}/file:
    get:
      tags: [Portal]
      summary: View own submitted document file (client)
      security:
        - BearerAuth: []
      description: |
        Decrypts and streams the client's own uploaded document. Only the
        document owner can access this endpoint — `client_id` is validated
        server-side against the authenticated session.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Document ID
      responses:
        "200":
          description: Raw decrypted file bytes with correct Content-Type
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          description: Unauthorized
        "404":
          description: Document not found or does not belong to this client

  /admin/documents/{id}/file:
    get:
      tags: [Admin]
      summary: Download decrypted document file (admin)
      security:
        - BearerAuth: []
      description: |
        Reads the encrypted file from disk, decrypts it with AES-256-GCM using
        the stored `enc_iv` and `enc_tag`, and streams the raw file bytes back
        with the original `Content-Type`.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Document ID
      responses:
        "200":
          description: Decrypted file bytes
          content:
            image/*:
              schema:
                type: string
                format: binary
            application/pdf:
              schema:
                type: string
                format: binary
        "401":
          description: Unauthorized (admin only)
        "404":
          description: Document not found
        "500":
          description: Decryption failed

  /admin/documents/{id}/review:
    post:
      tags: [Admin]
      summary: Approve or reject a document (super admin)
      security:
        - BearerAuth: []
      description: |
        Approves or rejects a client document. On rejection, sends an email and
        SMS to the client with the rejection reason. When all 4 required documents
        are approved for the first time, the client is auto-advanced to `docs_ready`
        and a "documents verified" email + SMS is sent.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Document ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision]
              properties:
                decision:
                  type: string
                  enum: [approved, rejected]
                reason:
                  type: string
                  description: Required when decision is "rejected"
      responses:
        "200":
          description: Review recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  auto_advanced:
                    type: boolean
                    description: True if client was auto-advanced to docs_ready
        "400":
          description: Missing or invalid decision / reason
        "401":
          description: Unauthorized
        "404":
          description: Document not found

  /admin/pipeline:
    get:
      tags: [Admin]
      summary: Get all active credit repair cases for the pipeline Kanban board
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Pipeline cases
          content:
            application/json:
              schema:
                type: object
                properties:
                  cases:
                    type: array
                    items:
                      $ref: "#/components/schemas/CreditRepairCase"
        "401":
          description: Unauthorized

  /admin/cases/{id}:
    get:
      tags: [Admin]
      summary: Get full detail for a single credit repair case
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Credit repair case ID
      responses:
        "200":
          description: Case detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  case_info:
                    type: object
                    properties:
                      id:
                        type: integer
                      case_number:
                        type: string
                        example: CR-00001
                      status:
                        type: string
                        enum: [active, completed, cancelled, on_hold]
                      pipeline_stage:
                        type: string
                      created_at:
                        type: string
                        format: date-time
                  client:
                    $ref: "#/components/schemas/AdminClientDetail"
                  documents:
                    type: array
                    items:
                      $ref: "#/components/schemas/ClientDocument"
                  reports:
                    type: array
                    items:
                      type: object
                  payments:
                    type: array
                    items:
                      type: object
                  pipeline_history:
                    type: array
                    items:
                      type: object
        "400":
          description: Invalid case ID
        "401":
          description: Unauthorized
        "404":
          description: Case not found

  /admin/cases/{id}/stage:
    post:
      tags: [Admin]
      summary: Move a credit repair case to a new pipeline stage
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Credit repair case ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [stage]
              properties:
                stage:
                  type: string
                  enum:
                    [
                      new_client,
                      docs_ready,
                      round_1,
                      round_2,
                      round_3,
                      round_4,
                      round_5,
                      completed,
                      cancelled,
                    ]
                notes:
                  type: string
      responses:
        "200":
          description: Stage updated (or unchanged if same stage)
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  unchanged:
                    type: boolean
                    description: True when the requested stage equals the current stage
        "400":
          description: Invalid stage value or case ID
        "401":
          description: Unauthorized
        "404":
          description: Case not found
        "422":
          description: Stage transition blocked (e.g. docs_ready requires all docs approved)

  /admin/clients:
    get:
      tags: [Admin]
      summary: List clients
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: stage
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                type: object
                properties:
                  clients:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminClientListItem"
    post:
      tags: [Admin]
      summary: Create a new client
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [first_name, last_name, email]
              properties:
                first_name:
                  type: string
                last_name:
                  type: string
                email:
                  type: string
                  format: email
                phone:
                  type: string
                package_id:
                  type: integer
                status:
                  type: string
                  enum: [pending_payment, onboarding, active, paused, cancelled]
      responses:
        "201":
          description: Client created
          content:
            application/json:
              schema:
                type: object
                properties:
                  client:
                    $ref: "#/components/schemas/AdminClientListItem"
        "409":
          description: Email already exists

  /admin/clients/{id}:
    put:
      tags: [Admin]
      summary: Update a client
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name:
                  type: string
                last_name:
                  type: string
                email:
                  type: string
                  format: email
                phone:
                  type: string
                package_id:
                  type: integer
                status:
                  type: string
                  enum: [pending_payment, onboarding, active, paused, cancelled]
      responses:
        "200":
          description: Updated client
          content:
            application/json:
              schema:
                type: object
                properties:
                  client:
                    $ref: "#/components/schemas/AdminClientListItem"
        "404":
          description: Client not found
        "409":
          description: Email already exists
    delete:
      tags: [Admin]
      summary: Delete a client
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "404":
          description: Client not found

  /admin/crc/status:
    get:
      tags: [CRC]
      summary: Check CRC API configuration status
      security:
        - BearerAuth: []
      responses:
        "200":
          description: CRC configuration status
          content:
            application/json:
              schema:
                type: object
                properties:
                  configured:
                    type: boolean
                  dry_run:
                    type: boolean
                  mode:
                    type: string
                    enum: [disabled, dry_run, live]

  /admin/crc/preview/{id}:
    get:
      tags: [CRC]
      summary: Preview the XML payload that would be sent for a client (no actual call)
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Preview payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  action:
                    type: string
                    enum: [insertRecord, updateRecord]
                  endpoint:
                    type: string
                  crc_client_id:
                    type: string
                    nullable: true
                  crc_synced_at:
                    type: string
                    nullable: true
                  xmlData:
                    type: string
                  note:
                    type: string
        "404":
          description: Client not found

  /admin/crc/simulate-webhook:
    post:
      tags: [CRC]
      summary: Simulate a Zapier stage-change webhook (for local testing)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [stage]
              properties:
                clientId:
                  type: integer
                email:
                  type: string
                  format: email
                stage:
                  type: string
                  example: "Round 2 (Month 2)"
      responses:
        "200":
          description: Webhook simulation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  simulated:
                    type: boolean
                  webhook_response:
                    type: object

  /admin/clients/{id}/crc-sync:
    post:
      tags: [CRC]
      summary: Manually push/sync a client to Credit Repair Cloud
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  crc_client_id:
                    type: string
                    nullable: true
                  crc_synced_at:
                    type: string
                    nullable: true
                    format: date-time
        "404":
          description: Client not found

  /admin/crc/sync-log:
    get:
      tags: [CRC]
      summary: Get CRC sync log entries
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
            maximum: 200
      responses:
        "200":
          description: List of sync log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CrcSyncLogEntry"

  /webhooks/crc:
    post:
      tags: [CRC]
      summary: Receive CRC pipeline stage update (called by Zapier)
      description: |
        Zapier posts here when a client's round/stage changes in Credit Repair Cloud.
        Optionally secured by a shared `secret` field compared against `CRC_WEBHOOK_SECRET`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [stage]
              properties:
                secret:
                  type: string
                  description: Shared webhook secret (CRC_WEBHOOK_SECRET)
                email:
                  type: string
                  format: email
                crc_client_id:
                  type: string
                  description: Base64-encoded CRC client ID
                stage:
                  type: string
                  example: "Round 2 (Month 2)"
      responses:
        "200":
          description: Stage updated (or no-op if unchanged / client not found)
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  stage:
                    type: string
                  clientId:
                    type: integer
        "400":
          description: Missing required fields
        "401":
          description: Invalid webhook secret
        "422":
          description: Unknown stage name

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    CreditRepairCase:
      type: object
      properties:
        id:
          type: integer
          description: credit_repair_cases.id
        case_number:
          type: string
          example: CR-00001
        client_id:
          type: integer
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
        phone:
          type: string
          nullable: true
        package_id:
          type: integer
          nullable: true
        package_name:
          type: string
          nullable: true
        package_slug:
          type: string
          nullable: true
        crc_client_id:
          type: string
          nullable: true
        crc_synced_at:
          type: string
          format: date-time
          nullable: true
        pipeline_stage:
          type: string
          enum:
            [
              new_client,
              docs_ready,
              round_1,
              round_2,
              round_3,
              round_4,
              round_5,
              completed,
              cancelled,
            ]
        pipeline_stage_changed_at:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum: [active, completed, cancelled, on_hold]
          description: Case status (distinct from client status)
        client_status:
          type: string
          description: Client account status
        created_at:
          type: string
          format: date-time
        docs_total:
          type: integer
        docs_approved:
          type: integer
        docs_pending:
          type: integer
        docs_rejected:
          type: integer

    AdminClientListItem:
      type: object
      properties:
        id:
          type: integer
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
        phone:
          type: string
          nullable: true
        pipeline_stage:
          type: string
          enum:
            [
              new_client,
              docs_ready,
              round_1,
              round_2,
              round_3,
              round_4,
              round_5,
              completed,
              cancelled,
            ]
        status:
          type: string
          enum: [pending_payment, onboarding, active, paused, cancelled]
        package_name:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    ClientDocument:
      type: object
      properties:
        id:
          type: integer
        client_id:
          type: integer
        doc_type:
          type: string
          enum: [id_front, id_back, ssn_card, proof_of_address, other]
        file_name:
          type: string
        file_size:
          type: integer
        mime_type:
          type: string
        storage_provider:
          type: string
          enum: [local, s3, r2]
        encrypted:
          type: integer
          enum: [0, 1]
        review_status:
          type: string
          enum: [pending, approved, rejected]
        rejection_reason:
          type: string
          nullable: true
        uploaded_at:
          type: string
          format: date-time

    CrcSyncLogEntry:
      type: object
      properties:
        id:
          type: integer
        client_id:
          type: integer
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
        action:
          type: string
          enum: [push_create, push_update, pull, webhook_stage_update]
        crc_client_id:
          type: string
          nullable: true
        pipeline_stage:
          type: string
          nullable: true
        status:
          type: string
          enum: [success, error]
        error_message:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
