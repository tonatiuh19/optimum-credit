                    type: array
                    items:
                      $ref: "#/components/schemas/PaymentSplit"
        "401":
          description: Unauthorized

  /pay/{token}:
    get:
      tags: [Public]
      summary: Get public split payment info by token
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Split payment details
          content:
            application/json:
              schema:
                type: object
                properties:
                  split_id:
                    type: integer
                  case_number:
                    type: string
                    nullable: true
                  label:
                    type: string
                  amount_cents:
                    type: integer
                  due_date:
                    type: string
                    format: date
                  status:
                    type: string
                  client_first_name:
                    type: string
                    nullable: true
                  has_stored_card:
                    type: boolean
        "404":
          description: Token not found or expired
    post:
      tags: [Public]
      summary: Process a split payment via token
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [method]
              properties:
                method:
                  type: string
                  enum: [stored_profile, new_card]
                data_descriptor:
                  type: string
                  description: Accept.js nonce descriptor (new_card only)
                data_value:
                  type: string
                  description: Accept.js nonce value (new_card only)
      responses:
        "200":
          description: Payment successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  transaction_id:
                    type: string
        "400":
          description: Invalid payment or split already paid
        "404":
          description: Token not found
